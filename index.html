<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Generatore di Titoli</title>

<style>

body{
    background: #d8d0c0;
    color:#222;
    font-family:"Times New Roman", serif;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

/* gattino nell'angolo */
.gattino{
    position:fixed;
    bottom:20px;
    right:20px;
    width:120px;
    border:4px double #555;
}

/* riquadro del titolo */
h1{
    text-align:center;
    max-width:800px;
    padding:40px;
    background:#f5f0e6;
    border:6px double #555;
    box-shadow:8px 8px 0px #999;
    font-size:42px;
    font-weight:normal;
}

/* bottone vecchio stile */
button{
    padding:12px 30px;
    font-family:"Times New Roman", serif;
    font-size:20px;
    background:#ddd;
    border:3px outset #aaa;
    cursor:pointer;
}

button:active{
    border:3px inset #aaa;
}

</style>

</head>


<body>

<!-- Metti qui la tua foto chiamata gatto.jpg -->
<img src="gatto.jpg" class="gattino">


<h1 id="titolo">Premi il pulsante</h1>

<button onclick="genera()">Genera titolo</button>


<script>

const sostantivi = [
    "Palinsesto",
    "Crisalide",
    "Aporia",
    "Vestigio",
    "Interstizio",
    "Filigrana",
    "Reliquia",
    "Reminiscenza",
    "Penombra",
    "Catabasi",
    "Lacuna",
    "Simulacro"
];


const verbi = [
    "essere",
    "chiamarsi",
    "divenire",
    "scordarsi",
    "toccare",
    "annusare",
    "lambire"
];


const nomi = [
    "Ernesto",
    "Mirko",
    "Elena",
    "Andrea",
    "Alessandro",
    "Daniele"
];


function genera(){

    const s = sostantivi[Math.floor(Math.random()*sostantivi.length)];
    const n = nomi[Math.floor(Math.random()*nomi.length)];
    const v = verbi[Math.floor(Math.random()*verbi.length)];

    document.getElementById("titolo").innerText =
        `${s} di ${v} ${n}`;

}

</script>


</body>
</html>
